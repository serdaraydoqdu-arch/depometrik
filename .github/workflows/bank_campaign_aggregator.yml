name: Banka Akaryakıt Kampanya Toplayıcı Veri Hattı

on:
  schedule:
    # Görevin her gün gece 03:00'te (UTC zaman dilimi) çalışmasını sağlayan Cron ifadesi
    - cron: '0 3 * * *'
  workflow_dispatch: # Test amaçlı manuel tetikleme yetkisi sağlar

jobs:
  scrape-parse-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Kaynak Kodu Sanal Makineye Klonla
        uses: actions/checkout@v4

      - name: Python Çalışma Ortamını Yapılandır
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Bağımlılık indirme sürelerini optimize eder

      - name: Python Bağımlılıklarını ve Tarayıcı Motorlarını Yükle
        run: |
          python -m pip install --upgrade pip
          pip install crawl4ai google-genai pydantic supabase playwright
          # Playwright aracılığıyla Chromium tarayıcı ikili dosyalarını (binaries) indir
          python -m playwright install chromium

      - name: Veri Kazıma, LLM İşleme ve Supabase Senkronizasyon Scriptini İcra Et
        env:
          # Ortam değişkenleri, GitHub Repository Secrets üzerinden güvenli bir şekilde alınır
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scratch/aggregator_engine.py
